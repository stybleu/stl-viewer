<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Viewer - {{ filename }}</title>

  <style>
    body { margin:0; font-family: Arial, sans-serif; background:#f6f7fb; }
    .viewer{
      width:100%;
      height:80vh;
      background:#0b1020;
      position:relative;
      overflow:hidden;
    }
    .status{
      position:absolute;
      right:10px;
      top:10px;
      background:rgba(255,255,255,.92);
      padding:8px 10px;
      border-radius:10px;
      font:12px/1.3 Arial, sans-serif;
      z-index:5;
      max-width:min(420px, 92vw);
      white-space:pre-wrap;
    }
    .bar{
      padding:10px 14px;
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      background:white;
      border-bottom:1px solid #e6e7ee;
    }
    .btn{
      display:inline-block;
      padding:8px 10px;
      border-radius:10px;
      border:1px solid #cfd2e2;
      background:#fff;
      text-decoration:none;
      color:#111;
      font-size:14px;
    }
  </style>
</head>

<body>
  <div class="bar">
    <div>
      <b>{{ filename }}</b><br>
      <span style="font-size:12px;color:#666">Drag = tourner • Molette = zoom • (mobile) 1 doigt = tourner, 2 doigts = zoom</span>
    </div>
    <div style="display:flex; gap:8px; flex-wrap:wrap;">
      <a class="btn" href="{{ url_for('index') }}">⬅ Retour</a>
      <a class="btn" href="{{ file_url }}" target="_blank">Ouvrir le STL</a>
    </div>
  </div>

  <div class="viewer" id="viewer" data-stl-url="{{ file_url }}">
    <div class="status" id="status">Init…</div>
  </div>

  <script>
    const statusEl = document.getElementById("status");
    const setStatus = (m) => statusEl.textContent = m;

    // Capture erreurs globales
    window.onerror = function(message, source, lineno, colno, error){
      setStatus("ERREUR JS ❌\n" + message + "\n" + (source||"") + ":" + lineno + ":" + colno + (error?.stack ? "\n\n"+error.stack : ""));
      return true;
    };
    window.onunhandledrejection = (e) => setStatus("PROMISE rejetée ❌\n" + String(e.reason || e));

    setStatus("HTML OK\nChargement libs…");
  </script>

  <!-- Libs Three en CDN + messages clairs -->
<script src="https://cdn.jsdelivr.net/npm/three@0.124.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.124.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.124.0/examples/js/loaders/STLLoader.js"></script>
  <!-- ✅ Code viewer INLINE (plus de viewer.js) -->
  <script>
    (function(){
      // Si les libs n'ont pas chargé, on stop
      if (typeof THREE === "undefined") return;

      const container = document.getElementById("viewer");
      const stlUrl = container.getAttribute("data-stl-url");

      setStatus("Libs OK ✅\nInit renderer…");

      let renderer;
      try {
        renderer = new THREE.WebGLRenderer({ antialias:true });
      } catch(e) {
        setStatus("ERREUR WebGLRenderer ❌\n" + e);
        return;
      }

      const gl = renderer.getContext && renderer.getContext();
      if (!gl) {
        setStatus("ERREUR: WebGL indisponible ❌\n→ Teste Chrome/Firefox (pas WebView) ou active l’accélération matérielle.");
        return;
      }

      const w = Math.max(container.clientWidth, 10);
      const h = Math.max(container.clientHeight, 10);
      renderer.setSize(w, h);
      container.appendChild(renderer.domElement);

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0b1020);

      const camera = new THREE.PerspectiveCamera(60, w/h, 0.1, 5000);
      camera.position.set(0, 5, 15);

      const controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;

      scene.add(new THREE.AmbientLight(0xffffff, 0.6));
      const light = new THREE.DirectionalLight(0xffffff, 1);
      light.position.set(5, 10, 7);
      scene.add(light);

      // Grille (si tu vois ça, le rendu fonctionne)
      const grid = new THREE.GridHelper(40, 40, 0xffffff, 0xffffff);
      grid.material.opacity = 0.15;
      grid.material.transparent = true;
      scene.add(grid);

      setStatus("Renderer OK ✅\nChargement STL…\n" + stlUrl);

      const loader = new THREE.STLLoader();
      loader.load(
        stlUrl,
        (geo) => {
          geo.computeVertexNormals();
          const mat = new THREE.MeshStandardMaterial({ color: 0x99ccff });
          const mesh = new THREE.Mesh(geo, mat);
          scene.add(mesh);

          // centre
          const box = new THREE.Box3().setFromObject(mesh);
          const center = box.getCenter(new THREE.Vector3());
          mesh.position.sub(center);

          setStatus("STL chargé ✅");
        },
        (xhr) => {
          if (xhr && xhr.total) {
            const pct = Math.round(xhr.loaded / xhr.total * 100);
            setStatus("Chargement STL… " + pct + "%");
          }
        },
        (err) => {
          setStatus("ERREUR chargement STL ❌\n" + (err?.message || String(err)) + "\n\nClique 'Ouvrir le STL' pour vérifier que Flask renvoie bien le fichier.");
        }
      );

      function animate(){
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
      }
      animate();

      window.addEventListener("resize", () => {
        const w2 = Math.max(container.clientWidth, 10);
        const h2 = Math.max(container.clientHeight, 10);
        renderer.setSize(w2, h2);
        camera.aspect = w2 / h2;
        camera.updateProjectionMatrix();
      });
    })();
  </script>
</body>
</html>
