<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Upload STL</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="card shadow p-4">
      <h1 class="h4 mb-3">Uploader un STL</h1>
      <form method="post" enctype="multipart/form-data">
        <input type="file" name="file" class="form-control mb-3" accept=".stl" required>
        <button class="btn btn-primary">Prévisualiser</button>
      </form>
      <div class="text-muted small mt-3">
        Si écran noir, l'erreur sera affiché en haut à droite.
      </div>
    </div>
  </div>
</body>
</html>
